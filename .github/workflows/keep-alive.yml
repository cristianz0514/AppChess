name: Keep Render awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping AppChess
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            --max-time 60 \
            https://appchess-region-test.onrender.com/
